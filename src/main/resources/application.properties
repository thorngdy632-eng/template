spring.application.name=template

# Ensure Khmer (UTF-8) text renders correctly in templates and HTTP responses
spring.thymeleaf.encoding=UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Gzip compression - reduces transfer size by ~70%
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json,image/svg+xml,font/woff,font/woff2,text/plain
server.compression.min-response-size=512

# Aggressive static resource caching (1 year)
spring.web.resources.cache.cachecontrol.max-age=31536000
spring.web.resources.cache.cachecontrol.must-revalidate=true

